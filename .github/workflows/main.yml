name: build-and-dsse-attest

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write

env:
  REKOR_SERVER: "https://rekor.sigstore.dev"
  PAYLOAD_TYPE: "application/vnd.in-toto+json"
  STATEMENT_TEMPLATE: ".github/workflows/statement.template.json"


jobs:
  build-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install rekor-cli
        run: |
          set -euo pipefail
          go install github.com/sigstore/rekor/cmd/rekor-cli@v1.4.4-0.20260112170304-cf9e0e9ba959+dirty
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          rekor-cli version

      - name: Install cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: "v3.0.3"

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build binaries
        run: |
          set -euo pipefail
          gcc -O3 -o bin1 src1/hello.c
          gcc -O3 -o bin2 src2/hello2.c
          ls -l bin1 bin2

      - name: Create in-toto statement from template (fill sha256/sha384)
        run: |
          set -euo pipefail

          BIN1_SHA256="$(sha256sum bin1 | awk '{print $1}')"
          BIN1_SHA384="$(sha384sum bin1 | awk '{print $1}')"
          BIN2_SHA256="$(sha256sum bin2 | awk '{print $1}')"
          BIN2_SHA384="$(sha384sum bin2 | awk '{print $1}')"

          echo "bin1 sha256=$BIN1_SHA256"
          echo "bin1 sha384=$BIN1_SHA384"
          echo "bin2 sha256=$BIN2_SHA256"
          echo "bin2 sha384=$BIN2_SHA384"

          sed \
            -e "s/__BIN1_SHA256__/${BIN1_SHA256}/g" \
            -e "s/__BIN1_SHA384__/${BIN1_SHA384}/g" \
            -e "s/__BIN2_SHA256__/${BIN2_SHA256}/g" \
            -e "s/__BIN2_SHA384__/${BIN2_SHA384}/g" \
            "$STATEMENT_TEMPLATE" > statement.json

          echo "Rendered statement.json:"
          cat statement.json

      - name: Create DSSE PAE bytes (pae.bin)
        run: |
          set -euo pipefail

          TYPE_LEN="$(printf "%s" "$PAYLOAD_TYPE" | wc -c | tr -d ' ')"
          PAYLOAD_LEN="$(wc -c < statement.json | tr -d ' ')"

          (
            printf "DSSEv1 %s %s %s " \
              "$TYPE_LEN" \
              "$PAYLOAD_TYPE" \
              "$PAYLOAD_LEN";
            cat statement.json
          ) > pae.bin
          
          echo "PAE size: $(wc -c < pae.bin) bytes"

      - name: Create signing config (no tlog upload)
        run: |
          set -euo pipefail
          curl -sSL https://raw.githubusercontent.com/sigstore/root-signing/refs/heads/main/targets/signing_config.v0.2.json \
            | jq 'del(.rekorTlogUrls)' > signing-config-no-tlog.json
          cat signing-config-no-tlog.json | jq .

      - name: Keyless sign PAE with cosign v3 (create bundle)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          ls -l pae.bin
      
          cosign sign-blob \
            --yes \
            --bundle pae.sigstore.json \
            --signing-config signing-config-no-tlog.json \
            pae.bin
      
          echo "Bundle created:"
          cat pae.sigstore.json

      - name: Build DSSE envelope (dsse.json) from bundle
        run: |
          set -euo pipefail
      
          PAYLOAD_B64="$(base64 < statement.json | tr -d '\n')"
      
          SIG_B64="$(jq -r '.messageSignature.signature? // empty' pae.sigstore.json | head -n 1)"
          CERT_PEM="$(jq -r '.verificationMaterial.certificate.rawBytes? // empty' pae.sigstore.json | head -n 1)"
      
          if [ -z "${SIG_B64}" ]; then
            echo "ERROR: Could not find base64Signature in bundle"
            jq . pae.sigstore.json | head -n 80
            exit 1
          fi
          if [ -z "${CERT_PEM}" ]; then
            echo "ERROR: Could not find cert in bundle"
            jq . pae.sigstore.json | head -n 80
            exit 1
          fi
      
          printf "%s\n" "${CERT_PEM}" > fulcio.crt.pem

          cat > dsse.json <<EOF
          {
            "payloadType": "${PAYLOAD_TYPE}",
            "payload": "${PAYLOAD_B64}",
            "signatures": [
              { "sig": "${SIG_B64}" }
            ]
          }
          EOF

          echo "DSSE envelope created: dsse.json"
          # debug
          cat dsse.json

      - name: Upload to Rekor as intoto:0.0.2 (DSSE envelope artifact)
        run: |
          set -euo pipefail

          rekor-cli upload \
            --rekor_server "${REKOR_SERVER}" \
            --type intoto:0.0.2 \
            --artifact dsse.json \
            --pki-format x509 \
            --public-key fulcio.crt.pem
